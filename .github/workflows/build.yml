name: Build & Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on:  macos-latest

    steps:
      - uses: actions/checkout@v4

      # Optional: pin a specific Xcode; adjust to what GitHub-hosted runners provide.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test --enable-swift-testing -v
