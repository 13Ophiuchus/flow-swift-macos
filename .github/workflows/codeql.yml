name: "CodeQL + Docs + AI review"

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  schedule:
    - cron: '39 19 * * 1'   # weekly scan

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && ' macos-26') || 'ubuntu-latest' }}

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            build-mode: manual
          - language: actions
            build-mode: none
          - language: ruby
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

    
  

      # ---------- Initialize CodeQL ----------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # ---------- Manual Swift build for CodeQL ----------
      - name: Build Swift package (SPM)
        if: matrix.language == 'swift' && matrix.build-mode == 'manual'
        shell: bash
        run: |
          swift --version
          swift build -v

      # ---------- No-op manual build for non-swift ----------
      - name: Run manual build steps (non-swift)
        if: matrix.language != 'swift' && matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo "No manual build required for ${LANGUAGE}"

      # ---------- Run analysis ----------
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
