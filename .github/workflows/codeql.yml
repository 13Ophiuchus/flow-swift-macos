name: "CodeQL + Docs + AI review"

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  schedule:
    - cron: '39 19 * * 1'   # weekly scan

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && ' macos-latest') || 'ubuntu-latest' }}

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            build-mode: manual
          - language: actions
            build-mode: none
          - language: ruby
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- Swift docs (runs only on Swift job) ----------
      - name: Generate Swift docs (swift-doc)
        if: matrix.language == 'swift'
        uses: SwiftDocOrg/swift-doc@v1
        with:
          module-name: Flow           # adjust if your module name differs
          output-directory: docs-swiftdoc
          # additional-arguments: "--base-url /flow-swift-macos"  # optional

      # ---------- Claude Code (AI review) ----------
      - name: Claude Code Action Official
        if: matrix.language == 'swift' && secrets.ANTHROPIC_API_KEY != ''
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      # ---------- Initialize CodeQL ----------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # ---------- Manual Swift build for CodeQL ----------
      - name: Build Swift package (SPM)
        if: matrix.language == 'swift' && matrix.build-mode == 'manual'
        shell: bash
        run: |
          swift --version
          swift build -v

      # ---------- No-op manual build for non-swift ----------
      - name: Run manual build steps (non-swift)
        if: matrix.language != 'swift' && matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo "No manual build required for ${LANGUAGE}"

      # ---------- Run analysis ----------
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
